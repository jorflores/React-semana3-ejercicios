<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flujo de Autenticación con JWT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface-soft: #f1f0ec;
    --border: #e2e0d8;
    --border-soft: #ede9e2;
    --border-strong: #c7c6f0;
    --text: #1a1917;
    --muted: #6b6860;
    --muted-soft: #9a968c;
    --accent: #3d3bcc;
    --accent-bg: #eeeef9;
    --radius: 10px;
    --font: 'Sora', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --bg2: var(--bg);
    --bg3: var(--surface-soft);
    --text2: var(--muted);
    --text3: var(--muted-soft);
    --border2: #b4b2a9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
    line-height: 1.7;
  }

  .page {
    max-width: 740px;
    margin: 0 auto;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 20px;
  }
  .home-link:hover { color: var(--accent); }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .header {
    border-bottom: 1.5px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .header p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--muted);
  }

  #dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform .25s, background .25s, opacity .25s;
    background: var(--surface-soft);
    flex-shrink: 0;
  }

  .diagram-wrap {
    width: 100%;
    margin-bottom: .5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
  }
  svg { display: block; width: 100%; }

  .info-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin: .5rem 0 .875rem;
    min-height: 76px;
  }
  .info-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
  }
  #sbadge {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    transition: background .3s, color .3s;
  }
  #stitle {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  #sdesc {
    font-size: 14px;
    color: var(--muted);
    padding-left: 36px;
    line-height: 1.55;
  }
  #scode {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding: 5px 10px;
    margin: 6px 0 0 36px;
    background: var(--surface-soft);
    border-radius: 6px;
    display: inline-block;
    transition: color .3s;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .ctrl-center {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #binfo {
    font-size: 13px;
    color: var(--muted);
    min-width: 80px;
    text-align: center;
  }

  button {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
    white-space: nowrap;
  }
  button:hover:not(:disabled) {
    background: var(--accent-bg);
    border-color: var(--border-strong);
    color: var(--accent);
  }
  button:active:not(:disabled) { transform: scale(.98); }
  button:disabled { opacity: .35; cursor: default; }
  #bauto { min-width: 76px; }

  @keyframes pulse-box { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pls { animation: pulse-box 1.1s ease-in-out 3 }

  .note {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-soft);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="page">
<a href="index.html" class="home-link">← Índice principal</a>

<div class="card">
  <div class="header">
    <div class="tag">JWT — Autenticación</div>
    <h1>Flujo de Autenticación con JWT</h1>
    <p>Haz clic en <strong>Siguiente</strong> para avanzar paso a paso, o usa <strong>▶ Auto</strong> para reproducir automáticamente.</p>
  </div>

  <div id="dots"></div>

  <div class="diagram-wrap">
    <svg viewBox="0 0 680 178" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <g id="gfe">
        <rect id="rfe" x="20" y="38" width="140" height="82" rx="10"
          fill="var(--bg)" stroke="var(--border)" stroke-width=".5"/>
        <text x="90" y="76" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="var(--text)">Frontend</text>
        <text x="90" y="96" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="var(--text3)">Navegador</text>
      </g>

      <g id="gbe">
        <rect id="rbe" x="270" y="38" width="140" height="82" rx="10"
          fill="var(--bg)" stroke="var(--border)" stroke-width=".5"/>
        <text x="340" y="76" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="var(--text)">Backend</text>
        <text x="340" y="96" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="var(--text3)">API REST</text>
      </g>

      <g id="gdb">
        <rect id="rdb" x="520" y="49" width="140" height="60" rx="8"
          fill="var(--bg2)" stroke="var(--border)" stroke-width=".5"/>
        <text x="590" y="81" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="var(--text2)">Base de datos</text>
      </g>

      <line x1="162" y1="73" x2="268" y2="73" stroke="var(--border2)" stroke-width="1" marker-end="url(#ah)" opacity=".35"/>
      <line x1="268" y1="89" x2="162" y2="89" stroke="var(--border2)" stroke-width="1" marker-end="url(#ah)" opacity=".35"/>
      <line x1="412" y1="79" x2="518" y2="79" stroke="var(--border2)" stroke-width="1" marker-end="url(#ah)" opacity=".25"/>

      <line id="aact" x1="0" y1="0" x2="0" y2="0" stroke="#999" stroke-width="2.5" marker-end="url(#ah)" opacity="0"/>

      <text id="albl" x="215" y="62" text-anchor="middle"
        font-family="'Fira Code',Consolas,monospace" font-size="10" fill="#999" opacity="0"/>

      <circle id="pkt" r="5" cx="-50" cy="-50" fill="white" stroke="#999" stroke-width="2" opacity="0"/>
    </svg>
  </div>

  <div class="info-card">
    <div class="info-top">
      <span id="sbadge"></span>
      <span id="stitle"></span>
    </div>
    <p id="sdesc"></p>
    <code id="scode"></code>
  </div>

  <div class="controls">
    <button id="bprev" onclick="go(-1)">← Anterior</button>
    <div class="ctrl-center">
      <span id="binfo"></span>
      <button id="bauto" onclick="toggleAuto()">▶ Auto</button>
    </div>
    <button id="bnext" onclick="go(1)">Siguiente →</button>
  </div>

</div>
</div>

<script>
const c = (l) => l;

const steps = [
  { n:1,
    title: 'Usuario envía credenciales',
    desc:  'El frontend hace un POST /login con el email y la contraseña del usuario.',
    code:  'fetch("/login", { method:"POST", body: JSON.stringify({email, password}) })',
    aid:   'a', lbl: 'POST /login',
    col:   c('#0F6E56','#5DCAA5'), bg: c('#E1F5EE','#085041'),
    boxes: ['rfe','rbe'] },
  { n:2,
    title: 'Backend verifica credenciales',
    desc:  'El servidor busca el usuario en la BD y compara la contraseña con bcrypt.',
    code:  'const match = await bcrypt.compare(password, user.passwordHash)',
    aid:   'c', lbl: 'bcrypt.compare()',
    col:   c('#185FA5','#85B7EB'), bg: c('#E6F1FB','#0C447C'),
    boxes: ['rbe','rdb'] },
  { n:3,
    title: 'Backend genera el token JWT',
    desc:  'Si las credenciales son correctas, el servidor firma y devuelve un JWT.',
    code:  'const token = jwt.sign({ id: user.id }, SECRET, { expiresIn: "1h" })',
    aid:   'b', lbl: '{ token: eyJ... }',
    col:   c('#534AB7','#AFA9EC'), bg: c('#EEEDFE','#3C3489'),
    boxes: ['rbe','rfe'] },
  { n:4,
    title: 'Frontend guarda el token',
    desc:  'El cliente almacena el JWT en localStorage para incluirlo en peticiones futuras.',
    code:  'localStorage.setItem("token", data.token)',
    aid:   's', lbl: 'localStorage.setItem()',
    col:   c('#BA7517','#EF9F27'), bg: c('#FAEEDA','#633806'),
    boxes: ['rfe'] },
  { n:5,
    title: 'Acceso a rutas protegidas',
    desc:  'El frontend adjunta el JWT al header HTTP de cada petición autenticada.',
    code:  'headers: { Authorization: `Bearer ${localStorage.getItem("token")}` }',
    aid:   'a', lbl: 'Bearer <token>',
    col:   c('#3B6D11','#97C459'), bg: c('#EAF3DE','#27500A'),
    boxes: ['rfe','rbe'] },
  { n:6,
    title: 'Backend valida el token',
    desc:  'El middleware verifica la firma del JWT. Si es válido, procesa y responde la petición.',
    code:  'const payload = jwt.verify(token, SECRET)  // lanza error si inválido',
    aid:   'b', lbl: '200 OK { data }',
    col:   c('#0C447C','#378ADD'), bg: c('#E6F1FB','#042C53'),
    boxes: ['rbe','rfe'] }
];

const AX = {
  a: { x1:162, y1:73, x2:268, y2:73, lx:215, ly:62 },
  b: { x1:268, y1:89, x2:162, y2:89, lx:215, ly:103 },
  c: { x1:412, y1:79, x2:518, y2:79, lx:465, ly:68 }
};

let cur = 0, raf = null, t0 = null, loop = null, autoTimer = null;

const dotsEl = document.getElementById('dots');
steps.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = 'dot' + i;
  d.onclick = () => { stopAuto(); cur = i; render(); };
  dotsEl.appendChild(d);
});

function startPkt(aid, col) {
  const a = AX[aid]; if (!a) return;
  const p = document.getElementById('pkt');
  p.setAttribute('stroke', col);
  p.setAttribute('fill', col);
  if (raf) cancelAnimationFrame(raf);
  t0 = null;
  const DUR = 900;
  const animate = (ts) => {
    if (!t0) t0 = ts;
    const pr = Math.min((ts - t0) / DUR, 1);
    const e = pr < .5 ? 2 * pr * pr : -1 + (4 - 2 * pr) * pr;
    p.setAttribute('cx', a.x1 + (a.x2 - a.x1) * e);
    p.setAttribute('cy', a.y1 + (a.y2 - a.y1) * e);
    p.setAttribute('opacity', pr < .8 ? '1' : String((1 - pr) / .2));
    if (pr < 1) raf = requestAnimationFrame(animate);
    else p.setAttribute('opacity', '0');
  };
  raf = requestAnimationFrame(animate);
}

function render() {
  const s = steps[cur];

  steps.forEach((_, i) => {
    const d = document.getElementById('dot' + i);
    d.style.background = i === cur ? s.col : i < cur ? s.col + '44' : 'var(--bg3)';
    d.style.transform = i === cur ? 'scale(1.45)' : 'scale(1)';
  });

  ['rfe','rbe','rdb'].forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('fill', id === 'rdb' ? 'var(--bg2)' : 'var(--bg)');
    el.setAttribute('stroke', 'var(--border)');
    el.setAttribute('stroke-width', '.5');
    el.classList.remove('pls');
  });

  s.boxes.forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('fill', s.bg);
    el.setAttribute('stroke', s.col);
    el.setAttribute('stroke-width', '1.5');
    if (s.aid === 's') el.classList.add('pls');
  });

  const aa = document.getElementById('aact');
  const al = document.getElementById('albl');
  const ax = AX[s.aid];
  if (ax) {
    aa.setAttribute('x1', ax.x1); aa.setAttribute('y1', ax.y1);
    aa.setAttribute('x2', ax.x2); aa.setAttribute('y2', ax.y2);
    aa.setAttribute('stroke', s.col); aa.setAttribute('opacity', '1');
    al.setAttribute('x', ax.lx); al.setAttribute('y', ax.ly);
    al.textContent = s.lbl;
    al.setAttribute('fill', s.col); al.setAttribute('opacity', '1');
    if (loop) clearInterval(loop);
    startPkt(s.aid, s.col);
    loop = setInterval(() => startPkt(s.aid, s.col), 1900);
  } else {
    aa.setAttribute('opacity', '0');
    al.setAttribute('opacity', '0');
    document.getElementById('pkt').setAttribute('opacity', '0');
    if (raf) cancelAnimationFrame(raf);
    if (loop) clearInterval(loop);
  }

  const b = document.getElementById('sbadge');
  b.textContent = s.n;
  b.style.background = s.bg;
  b.style.color = s.col;
  document.getElementById('stitle').textContent = s.title;
  document.getElementById('sdesc').textContent = s.desc;
  const codeEl = document.getElementById('scode');
  codeEl.textContent = s.code;
  codeEl.style.color = s.col;

  document.getElementById('binfo').textContent = 'Paso ' + s.n + ' de 6';
  document.getElementById('bprev').disabled = cur === 0;
  document.getElementById('bnext').disabled = cur === 5;
  document.getElementById('bnext').textContent = cur === 5 ? '✓ Completado' : 'Siguiente →';
}

function go(d) {
  const n = cur + d;
  if (n >= 0 && n < 6) { cur = n; render(); }
}

function toggleAuto() {
  if (autoTimer) { stopAuto(); }
  else {
    document.getElementById('bauto').textContent = '■ Stop';
    autoTimer = setInterval(() => {
      if (cur < 5) { cur++; render(); }
      else stopAuto();
    }, 2400);
  }
}
function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  document.getElementById('bauto').textContent = '▶ Auto';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
});

render();
</script>
</body>
</html>
